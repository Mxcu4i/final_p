{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-6">
        <img src="{{ product.image.url }}" class="img-fluid rounded shadow">
    </div>

    <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <h4 class="text-success">{{ product.price }} SAR</h4>
        <p>{{ product.description }}</p>

        <a href="/" class="btn btn-secondary">رجوع</a>
    </div>

</div>

{% endblock %}
